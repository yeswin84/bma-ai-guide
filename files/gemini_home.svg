  <path d="M 1355 304 l 8 9 l 8 -9" stroke="#5f6368" stroke-width="2.2" fill="none"/>
  <rect x="1268" y="287" width="120" height="42" stroke="#d61f1f" stroke-width="3.5" fill="none"/>
